openapi: 3.0.0
info:
  title: Manager Service API
  description: API documentation for manager service.
  version: 1.0.0
servers:
  - url: https://zwjg64qp11.execute-api.eu-west-1.amazonaws.com/prod
    description: server
paths:
  /users:
    post:
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The user name
                email:
                  type: string
                  description: The product email
                image:
                  type: string
                  description: The user image
                password:
                  type: string
                  description: The user password
                is_admin:
                  type: boolean
                  description: The user status
              required:
                - name
                - email
                - password

      responses:
        "200":
          description: The user was created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The ID of the created user
                  name:
                    type: string
                    description: The user name
                  email:
                    type: string
                    description: The product email
                  image:
                    type: string
                    description: The user image
                  password:
                    type: string
                    description: The user password
                  is_admin:
                    type: boolean
                    description: The user status
        "400":
          description: Missing request body
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Error message
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Error message
  /users/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: The product email
                password:
                  type: string
                  description: The user password
              required:
                - email
                - password

      responses:
        "200":
          description: The user was login successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The ID of the created user
                  name:
                    type: string
                    description: The user name
                  email:
                    type: string
                    description: The product email
                  image:
                    type: string
                    description: The user image
                  password:
                    type: string
                    description: The user password
                  is_admin:
                    type: boolean
                    description: The user status
        "400":
          description: Invalid user data
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Error message
        "401":
          description: Invalid password
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Error message
        "404":
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Error message
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Error message
  
